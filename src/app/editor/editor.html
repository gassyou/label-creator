<section class="editor-shell">
  <app-editor-topbar
    [hasSelection]="hasSelection()"
    [hasMultiSelection]="hasMultiSelection()"
    [zoom]="canvasService.zoom()"
    [templateName]="templateName()"
    [isDirty]="isDirty()"
    (saveRequested)="saveToTemplate()"
    (backRequested)="backToList()"
    (svgRequested)="rasterizeSVG()"
    (pngRequested)="rasterize()"
    (pdfRequested)="exportPdf()"
    (zoomInRequested)="zoomIn()"
    (zoomOutRequested)="zoomOut()"
    (cloneRequested)="cloneSelection()"
    (bringFrontRequested)="bringSelectionToFront()"
    (sendBackRequested)="sendSelectionToBack()"
    (alignLeftRequested)="alignObjects('left')"
    (alignCenterHRequested)="alignObjects('center')"
    (alignRightRequested)="alignObjects('right')"
    (alignTopRequested)="alignObjects('top')"
    (alignCenterVRequested)="alignObjects('middle')"
    (alignBottomRequested)="alignObjects('bottom')"
    (distributeHRequested)="distributeObjects('horizontal')"
    (distributeVRequested)="distributeObjects('vertical')"
    (templateNameChanged)="updateTemplateName($event)"
    (printSettingRequested)="openPrintSettingDialog()"
  />

  <div class="workspace">
    <aside class="left-shell">
      <app-editor-tool-strip
        [activeTool]="activeTool()"
        (toolSelected)="activateTool($event)"
      />
    </aside>

    <section class="stage-panel">
      <div class="canvas-stage">
        <div class="canvas-frame">
          <canvas id="canvas" #htmlCanvas></canvas>
        </div>
      </div>
    </section>

    <app-editor-properties-panel
      [canvasState]="canvasState()"
      [selectionState]="selectionState()"
      [textEditorVisible]="textEditorVisible()"
      [figureEditorVisible]="figureEditorVisible()"
      [propsPanelVisible]="propsPanelVisible()"
      (canvasFillChanged)="updateCanvasFill($event)"
      (canvasImageChanged)="updateCanvasImage($event)"
      (pageSizeChanged)="updateCanvasSize($event)"
      (canvasSizeChanged)="updateCanvasDimensions($event)"
      (idChanged)="updateSelectionId($event)"
      (opacityChanged)="updateSelectionOpacity($event)"
      (widthChanged)="updateSelectionWidth($event)"
      (heightChanged)="updateSelectionHeight($event)"
      (lengthChanged)="updateSelectionLength($event)"
      (fillChanged)="updateSelectionFill($event)"
      (strokeChanged)="updateSelectionStroke($event)"
      (strokeWidthChanged)="updateSelectionStrokeWidth($event)"
      (fontFamilyChanged)="updateSelectionFontFamily($event)"
      (boldToggled)="toggleBold()"
      (italicToggled)="toggleItalic()"
      (textDecorationToggled)="toggleTextDecoration($event)"
      (fontSizeChanged)="updateSelectionFontSize($event)"
      (textChanged)="updateSelectionText($event)"
      (colorChanged)="updateSelectionColor($event)"
      (barcodeFormatChanged)="updateBarcodeFormat($event)"
      (barcodeShowTextChanged)="updateBarcodeShowText($event)"
      (errorCorrectionLevelChanged)="updateErrorCorrectionLevel($event)"
      (foregroundColorChanged)="updateForegroundColor($event)"
      (backgroundColorChanged)="updateBackgroundColor($event)"
      (textAlignChanged)="updateSelectionTextAlign($event)"
      (verticalAlignChanged)="updateSelectionVerticalAlign($event)"
    />

    @if (printSettingVisible()) {
      <app-print-setting-dialog
        [printSetting]="template().printSetting"
        (settingChanged)="updatePrintSetting($event)"
        (closed)="printSettingVisible.set(false)"
      />
    }
  </div>
</section>
