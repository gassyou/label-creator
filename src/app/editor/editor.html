<section class="editor-shell">
  <app-editor-topbar
    [hasSelection]="hasSelection()"
    [hasMultiSelection]="hasMultiSelection()"
    [zoom]="zoom()"
    [templateName]="templateName()"
    [isDirty]="isDirty()"
    (saveRequested)="saveToTemplate()"
    (backRequested)="backToList()"
    (svgRequested)="rasterizeSVG()"
    (pngRequested)="rasterize()"
    (pdfRequested)="exportPdf()"
    (zoomInRequested)="zoomIn()"
    (zoomOutRequested)="zoomOut()"
    (cloneRequested)="cloneSelection()"
    (bringFrontRequested)="bringSelectionToFront()"
    (sendBackRequested)="sendSelectionToBack()"
    (alignLeftRequested)="alignObjects('left')"
    (alignCenterHRequested)="alignObjects('center')"
    (alignRightRequested)="alignObjects('right')"
    (alignTopRequested)="alignObjects('top')"
    (alignCenterVRequested)="alignObjects('middle')"
    (alignBottomRequested)="alignObjects('bottom')"
    (distributeHRequested)="distributeObjects('horizontal')"
    (distributeVRequested)="distributeObjects('vertical')"
    (templateNameChanged)="updateTemplateName($event)"
    (printSettingRequested)="openPrintSettingDialog()"
    (undoRequested)="undo()"
    (redoRequested)="redo()"
  />

  <div class="workspace">
    <aside class="left-shell">
      <app-editor-tool-strip [activeTool]="activeTool()" (toolSelected)="activateTool($event)" />
    </aside>

    <section class="stage-panel">
      <div class="canvas-stage">
        <div class="canvas-frame">
          <canvas id="canvas" #htmlCanvas></canvas>
        </div>
      </div>
    </section>

    <app-properties-panel></app-properties-panel>

    @if (printSettingVisible()) {
      <app-print-setting-dialog
        [printSetting]="template().printSetting"
        (settingChanged)="updatePrintSetting($event)"
        (closed)="printSettingVisible.set(false)"
      />
    }
  </div>
</section>
