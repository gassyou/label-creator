<!-- src/app/editor/properties/barcode-properties.component.html -->
@let s = state();
@if (s) {
  <label>
    <span>Barcode Format</span>
    <select [ngModel]="$any(s).barcodeFormat" (ngModelChange)="onFormatChange($event)">
      <option value="CODE128">CODE128</option>
      <option value="EAN13">EAN-13</option>
      <option value="CODE39">CODE39</option>
    </select>
  </label>
  <label>
    <span>Value</span>
    <input type="text" [ngModel]="$any(s).bindingValue" (ngModelChange)="onTextChange($event)" />
  </label>
  <label class="checkbox-label">
    <input
      type="checkbox"
      [ngModel]="$any(s).showText"
      (ngModelChange)="onShowTextChange($event)"
    />
    <span>Show Text</span>
  </label>
}
