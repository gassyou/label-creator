<!-- src/app/editor/properties/common-properties.component.html -->
@let s = state();
@if (s) {
  <label>
    <span>Opacity {{ opacity(s) | number:'1.0-0' }}%</span>
    <input
      type="range"
      min="0"
      max="100"
      [ngModel]="opacity(s) * 100"
      (ngModelChange)="onOpacityChange($event)"
    />
  </label>
}
